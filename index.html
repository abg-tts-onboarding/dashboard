<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ABG × Pattern — TikTok Shop Portfolio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f8f8f4;
    --border: #e8e8e0;
    --border2: #d8d8d0;
    --ink: #111111;
    --ink2: #555555;
    --ink3: #999999;
    --blue: #1d4ed8;
    --green: #16a34a;
    --amber: #b45309;
    --red: #dc2626;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; padding: 24px; font-size: 14px; line-height: 1.5;
  }
  .page { max-width: 1280px; margin: 0 auto; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .header-title { font-size: 17px; font-weight: 600; }
  .pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; border: 1px solid; cursor: pointer; transition: opacity .15s; }
  .pill:hover { opacity: .75; }
  .pill-red   { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
  .pill-amber { background: #fffbeb; color: #b45309; border-color: #fde68a; }
  .pill-green { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
  .pill.active-filter { box-shadow: 0 0 0 2px currentColor; }
  .as-of { font-size: 12px; color: var(--ink3); }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 12px; margin-bottom: 16px; }
  @media(max-width:860px) { .metrics { grid-template-columns: repeat(3,1fr); } }
  @media(max-width:560px) { .metrics { grid-template-columns: repeat(2,1fr); } }
  .metric {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .metric:hover { border-color: var(--border2); }
  .metric.m-active-crit { border-color: #fca5a5; background: #fef2f2; }
  .metric.m-active-urg  { border-color: #fcd34d; background: #fffbeb; }
  .metric.m-active-ok   { border-color: #86efac; background: #f0fdf4; }
  .metric.m-active-ein  { border-color: #93c5fd; background: #eff6ff; }
  .metric-label { font-size: 12px; color: var(--ink2); margin-bottom: 4px; }
  .metric-val { font-size: 26px; font-weight: 600; line-height: 1; margin-bottom: 3px; }
  .metric-sub { font-size: 11px; color: var(--ink3); }

  /* Pipeline banner */
  .pipeline-flow {
    display: flex; align-items: center; flex-wrap: wrap; gap: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 18px; margin-bottom: 16px;
  }
  .pipeline-flow-title { font-size: 11px; font-weight: 600; color: var(--ink3); margin-right: 14px; white-space: nowrap; text-transform: uppercase; letter-spacing: .04em; }
  .pipe-chip {
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    border-radius: 4px; white-space: nowrap; border: 1px solid transparent;
    cursor: pointer; transition: opacity .15s, background .1s;
  }
  .pipe-chip:hover { opacity: .75; }
  .pipe-arrow { color: var(--ink3); font-size: 12px; padding: 0 5px; }

  /* Charts row */
  .two-col { display: grid; grid-template-columns: minmax(0,1.6fr) minmax(0,1fr); gap: 14px; margin-bottom: 14px; }
  @media(max-width:700px) { .two-col { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--ink); }

  /* Stage bars */
  .stage-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .stage-row:last-of-type { border-bottom: none; }
  .stage-row:hover .stage-label { color: var(--blue); text-decoration: underline; }
  .stage-label { font-size: 12px; color: var(--ink2); width: 130px; flex-shrink: 0; }
  .bar-wrap { flex: 1; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .bar { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .stage-count { font-size: 13px; font-weight: 600; width: 22px; text-align: right; flex-shrink: 0; }

  /* Priority breakdown */
  .pri-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .pri-row:last-of-type { border-bottom: none; }
  .pri-row:hover .b-name { color: var(--blue); text-decoration: underline; }
  .b-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .b-name { font-size: 13px; flex: 1; }
  .b-n { font-size: 15px; font-weight: 600; }
  .b-pct { font-size: 11px; color: var(--ink3); width: 34px; text-align: right; }

  /* Filter bar */
  .filter-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 16px;
    margin-bottom: 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
  }
  .filter-label { font-size: 11px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
  .filter-divider { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }
  .sort-btn {
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    border: 1px solid var(--border2); border-radius: 20px;
    background: var(--surface); cursor: pointer; color: var(--ink2); white-space: nowrap;
    transition: border-color .12s, color .12s, background .12s;
  }
  .sort-btn:hover { border-color: var(--blue); color: var(--blue); }
  .sort-btn.active { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; font-weight: 600; }
  .result-count { font-size: 12px; color: var(--ink3); margin-left: auto; }

  /* Brand cards grid */
  .brands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }

  /* Brand card */
  .brand-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .brand-card:hover { border-color: var(--border2); box-shadow: 0 4px 14px rgba(0,0,0,.08); }
  .brand-card.bc-critical { border-color: #fca5a5; }
  .brand-card-strip { height: 3px; }
  .brand-card-body { padding: 14px 16px; }

  /* Card header */
  .bc-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 11px; }
  .bc-avatar { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: white; flex-shrink: 0; }
  .bc-name { font-weight: 600; font-size: 13.5px; color: var(--ink); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bc-opco { font-size: 11px; color: var(--ink3); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bc-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }

  /* Status / priority chips */
  .status-chip {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 20px; white-space: nowrap; font-weight: 600; border: 1px solid;
  }
  .pri-chip { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 6px; white-space: nowrap; border: 1px solid; }

  /* Progress stepper */
  .bc-progress { display: flex; align-items: flex-start; margin-bottom: 11px; }
  .prog-step { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .prog-dot {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .prog-line { flex: 1; height: 2px; margin-top: -9px; flex-shrink: 1; }
  .prog-label { font-size: 8.5px; color: var(--ink3); margin-top: 3px; text-align: center; max-width: 55px; line-height: 1.2; }

  /* Tags row */
  .bc-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 6px; background: var(--surface2); color: var(--ink2); border: 1px solid var(--border); font-weight: 500; }
  .tag-blue { background: #eff6ff; color: var(--blue); border-color: #bfdbfe; }
  .expand-arrow { margin-left: auto; font-size: 11px; color: var(--ink3); transition: transform .2s; display: inline-block; }

  /* Action preview */
  .action-preview {
    font-size: 11px; line-height: 1.5; padding: 7px 10px; border-radius: 7px; border: 1px solid;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* Expanded section */
  .bc-expanded { border-top: 1px solid var(--border); padding: 12px 16px; animation: fadeIn .15s ease; }
  .exp-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--ink3); margin-bottom: 5px; }
  .exp-text { font-size: 12px; color: var(--ink2); line-height: 1.65; }
  .action-box { border-radius: 8px; padding: 10px 13px; margin-top: 10px; border: 1px solid; }
  .action-box-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .action-box-text { font-size: 12px; line-height: 1.6; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
</style>

function nameColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${((h % 360) + 360) % 360},50%,38%)`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function setStatusFilter(s) {
  _statusFilter = _statusFilter === s ? null : s;
  _priFilter = null;
  render();
}
function togglePriFilter(p) {
  _priFilter = _priFilter === p ? null : p;
  _statusFilter = null;
  render();
}
function clearAll() {
  _statusFilter = null; _priFilter = null; _search = '';
  document.getElementById('search-input').value = '';
  render();
}
function toggleExpand(brand) {
  if (_expanded.has(brand)) _expanded.delete(brand); else _expanded.add(brand);
  render();
}
function applySearch() {
  _search = document.getElementById('search-input').value;
  render();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const total = ABG_BRANDS.length;
  const counts = {};
  Object.keys(STATUS_CFG).forEach(s => counts[s] = ABG_BRANDS.filter(b => b.status === s).length);
  const priCounts = { critical:0, urgent:0, normal:0 };
  ABG_BRANDS.forEach(b => priCounts[b.priority || 'normal']++);

  // Header pills
  document.getElementById('pill-critical').textContent = `🔴 ${priCounts.critical} critical`;
  document.getElementById('pill-urgent').textContent   = `🟡 ${priCounts.urgent} urgent`;
  document.getElementById('pill-ontrack').textContent  = `🟢 ${priCounts.normal} on track`;
  ['pill-critical','pill-urgent','pill-ontrack'].forEach((id, i) => {
    const keys = ['critical','urgent','normal'];
    const el = document.getElementById(id);
    el.classList.toggle('active-filter', _priFilter === keys[i]);
  });
  document.getElementById('as-of').textContent = `Updated ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;

  // Pipeline flow bar
  let pipe = `<span class="pipeline-flow-title">Pipeline</span>`;
  PIPE_ORDER.forEach((s, i) => {
    const sc = STATUS_CFG[s];
    const isActive = _statusFilter === s;
    pipe += `<span class="pipe-chip" onclick="setStatusFilter('${s}')"
      style="background:${isActive ? sc.bg : 'var(--surface2)'};color:${isActive ? sc.color : 'var(--ink2)'};border-color:${isActive ? sc.border : 'transparent'}">
      ${s} <strong>${counts[s]}</strong>
    </span>`;
    if (i < PIPE_ORDER.length - 1) pipe += `<span class="pipe-arrow">→</span>`;
  });
  document.getElementById('pipeline-flow').innerHTML = pipe;

  // Metrics row
  const priActiveClass = { critical:'m-active-crit', urgent:'m-active-urg', normal:'m-active-ok' };
  document.getElementById('metrics-row').innerHTML = `
    <div class="metric" onclick="clearAll()">
      <div class="metric-label">Total Brands</div>
      <div class="metric-val">${total}</div>
      <div class="metric-sub">ABG portfolio</div>
    </div>
    <div class="metric ${_priFilter==='critical'?'m-active-crit':''}" onclick="togglePriFilter('critical')">
      <div class="metric-label">🔴 Critical</div>
      <div class="metric-val" style="color:#dc2626">${priCounts.critical}</div>
      <div class="metric-sub">immediate action needed</div>
    </div>
    <div class="metric ${_priFilter==='urgent'?'m-active-urg':''}" onclick="togglePriFilter('urgent')">
      <div class="metric-label">🟡 Urgent</div>
      <div class="metric-val" style="color:#b45309">${priCounts.urgent}</div>
      <div class="metric-sub">action needed soon</div>
    </div>
    <div class="metric ${_priFilter==='normal'?'m-active-ok':''}" onclick="togglePriFilter('normal')">
      <div class="metric-label">🟢 On Track</div>
      <div class="metric-val" style="color:#16a34a">${priCounts.normal}</div>
      <div class="metric-sub">no blockers</div>
    </div>
    <div class="metric ${_statusFilter==='EIN Transfer'?'m-active-ein':''}" onclick="setStatusFilter('EIN Transfer')">
      <div class="metric-label">⇄ EIN Transfer</div>
      <div class="metric-val" style="color:#1d4ed8">${counts['EIN Transfer']}</div>
      <div class="metric-sub">pending authorization</div>
    </div>
  `;

  // Status chart
  const maxCount = Math.max(...Object.values(counts), 1);
  const statusBarColors = { 'Live':'#16a34a', 'In Progress':'#f59e0b', 'EIN Transfer':'#3b82f6', 'Not Started':'#9ca3af' };
  let statusChart = '';
  ['Live','In Progress','EIN Transfer','Not Started'].forEach(s => {
    const n = counts[s];
    const pct = Math.round((n / maxCount) * 100);
    statusChart += `
      <div class="stage-row" onclick="setStatusFilter('${s}')">
        <span class="stage-label">${s}</span>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${statusBarColors[s]}"></div></div>
        <span class="stage-count">${n}</span>
      </div>`;
  });
  document.getElementById('status-chart').innerHTML = statusChart;

  // Priority chart
  let priChart = '';
  [['critical','Critical'],['urgent','Urgent'],['normal','On Track']].forEach(([key, label]) => {
    const n = priCounts[key];
    const p = PRI_CFG[key];
    const pct = total > 0 ? Math.round((n / total) * 100) : 0;
    priChart += `
      <div class="pri-row" onclick="togglePriFilter('${key}')">
        <div class="b-dot" style="background:${p.dot}"></div>
        <span class="b-name">${label}</span>
        <span class="b-n">${n}</span>
        <span class="b-pct">${pct}%</span>
      </div>`;
  });
  document.getElementById('priority-chart').innerHTML = priChart;

  // Filter bar button states
  const fbMap = { 'fb-all': null, 'fb-live': 'Live', 'fb-inprog': 'In Progress', 'fb-notstarted': 'Not Started', 'fb-ein': 'EIN Transfer' };
  Object.entries(fbMap).forEach(([id, val]) => {
    const btn = document.getElementById(id);
    if (btn) btn.className = 'sort-btn' + (_statusFilter === val && !_priFilter ? ' active' : '');
  });
  // All button active only when no filters
  document.getElementById('fb-all').className = 'sort-btn' + (!_statusFilter && !_priFilter ? ' active' : '');

  // Filter brands
  let filtered = ABG_BRANDS.slice();
  if (_statusFilter) filtered = filtered.filter(b => b.status === _statusFilter);
  if (_priFilter)    filtered = filtered.filter(b => b.priority === _priFilter);
  if (_search) {
    const q = _search.toLowerCase();
    filtered = filtered.filter(b => b.brand.toLowerCase().includes(q) || b.opco.toLowerCase().includes(q));
  }
  document.getElementById('result-count').textContent = `${filtered.length} / ${total} brands`;

  // Brand cards
  if (!filtered.length) {
    document.getElementById('brands-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--ink3);font-size:14px">No brands match your filter.</div>`;
    return;
  }

  const checkSvg = `<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2 2L7.5 2.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  let cards = '';
  filtered.forEach(b => {
    const sc   = STATUS_CFG[b.status];
    const pc   = PRI_CFG[b.priority || 'normal'];
    const exp  = _expanded.has(b.brand);
    const ini  = b.brand[0].toUpperCase();
    const done = b.progress !== undefined ? b.progress : 0;

    const STEPS = b.status === 'EIN Transfer'
      ? ['Current Entity', 'EIN / Agency', 'Pattern Live']
      : ['Shop Setup', 'Products Live', 'Fully Live'];

    const stripColor      = b.priority === 'critical' ? pc.strip : sc.strip;
    const cardBorderStyle = b.priority === 'critical' ? 'border-color:#fca5a5' : '';
    const safeKey         = b.brand.replace(/'/g,"\\'").replace(/"/g,'&quot;');

    cards += `
    <div class="brand-card${b.priority==='critical'?' bc-critical':''}" style="${cardBorderStyle}"
         onclick="toggleExpand('${safeKey}')">
      <div class="brand-card-strip" style="background:${stripColor}"></div>
      <div class="brand-card-body">

        <!-- Header -->
        <div class="bc-header">
          <div class="bc-avatar" style="background:${nameColor(b.brand)}">${ini}</div>
          <div style="flex:1;min-width:0">
            <div class="bc-name">${b.brand}</div>
            <div class="bc-opco">${b.opco}</div>
          </div>
          <div class="bc-badges">
            <span class="status-chip" style="background:${sc.bg};color:${sc.color};border-color:${sc.border}55">${b.status}</span>
            <span class="pri-chip" style="background:${pc.bg};color:${pc.color};border-color:${pc.border}">${pc.label}</span>
          </div>
        </div>

        <!-- Progress stepper -->
        <div class="bc-progress">
          ${STEPS.map((step, i) => {
            const isDone = i < done;
            const isCurr = i === done;
            const dotBg     = isDone ? sc.strip : 'white';
            const dotBorder = isDone || isCurr ? sc.strip : '#d1d5db';
            const lblColor  = isDone || isCurr ? sc.color : 'var(--ink3)';
            const lblWeight = isDone || isCurr ? '600' : '400';
            const inner     = isDone ? checkSvg : (isCurr ? `<div style="width:6px;height:6px;border-radius:50%;background:${sc.strip}"></div>` : '');
            const lineColor = isDone ? sc.strip : '#e5e7eb';
            return `
              <div class="prog-step">
                <div class="prog-dot" style="background:${dotBg};border-color:${dotBorder}">${inner}</div>
                <div class="prog-label" style="color:${lblColor};font-weight:${lblWeight}">${step}</div>
              </div>
              ${i < STEPS.length - 1 ? `<div class="prog-line" style="background:${lineColor}"></div>` : ''}`;
          }).join('')}
        </div>

        <!-- Tags -->
        <div class="bc-tags">
          <span class="tag">${b.shopStatus}</span>
          ${b.skus ? `<span class="tag tag-blue">${b.skus}</span>` : ''}
          <span class="expand-arrow" style="transform:${exp?'rotate(180deg)':'rotate(0)'}">▾</span>
        </div>

        <!-- Action preview (collapsed) -->
        ${!exp && b.action ? `
          <div class="action-preview" style="background:${pc.bg};color:${pc.color};border-color:${pc.border}">
            ${b.priority==='critical'?'🚨':'⚡'} ${b.action}
          </div>` : ''}

      </div>

      <!-- Expanded content -->
      ${exp ? `
        <div class="bc-expanded">
          <div class="exp-label">Current Status</div>
          <div class="exp-text">${b.currentWork}</div>
          ${b.action ? `
            <div class="action-box" style="background:${pc.bg};border-color:${pc.border}">
              <div class="action-box-label" style="color:${pc.color}">${b.priority==='critical'?'🚨 Action Required':'⚡ Next Steps'}</div>
              <div class="action-box-text" style="color:${pc.color}">${b.action}</div>
            </div>` : ''}
        </div>` : ''}

    </div>`;
  });

  document.getElementById('brands-grid').innerHTML = cards;
}

render();
</script>
</body>
</html>
